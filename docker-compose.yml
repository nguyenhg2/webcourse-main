version: "3.8"

services:

  frontend:
    build: ./frontend
    container_name: webcourse-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true
    restart: unless-stopped