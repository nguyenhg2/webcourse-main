services:
  mongo:
    image: mongo:7
    container_name: webcourse-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: webcourse-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  core:
    build: ./backend/core-service
    container_name: webcourse-core
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URI=${DOCKER_MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-codecamp_core}
      - PAYMENT_MONGODB_DB=${PAYMENT_MONGODB_DB:-codecamp_payment}
      - REDIS_URL=${DOCKER_REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - CORS_ORIGINS=*
    restart: unless-stopped
    depends_on:
      - mongo
      - redis

  api-gateway:
    build: ./backend/api-gateway
    container_name: webcourse-api-gateway
    ports:
      - "8000:8000"
    environment:
      - CORE_SERVICE_URL=http://core:8001
      - PAYMENT_SERVICE_URL=http://payment:8002
      - BLOG_SERVICE_URL=http://blog:8003
    restart: unless-stopped
    depends_on:
      - core
      - payment
      - blog

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: webcourse-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000/core
      - VITE_PAYMENT_API_URL=http://localhost:8000/payment
      - VITE_BLOG_API_URL=http://localhost:8000/blog
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - api-gateway

  seed:
    build: ./backend/core-service
    container_name: webcourse-seed
    working_dir: /app
    command: python -c "import sys; sys.path.insert(0,'/seed'); exec(open('/seed/seed.py').read())"
    volumes:
      - ./backend:/seed
    environment:
      - MONGODB_URI=${DOCKER_MONGODB_URI:-mongodb://mongo:27017}
      - MONGODB_DB=${MONGODB_DB:-codecamp_core}
      - BLOG_MONGODB_DB=${BLOG_MONGODB_DB:-codecamp_php}
      - PAYMENT_MONGODB_DB=${PAYMENT_MONGODB_DB:-codecamp_payment}
    profiles:
      - seed
    depends_on:
      - mongo

  blog:
    build: ./backend/blog-service
    container_name: webcourse-blog
    ports:
      - "8003:8003"
    environment:
      - MONGODB_URI=${DOCKER_MONGODB_URI:-mongodb://mongo:27017}
      - BLOG_MONGODB_DB=${BLOG_MONGODB_DB:-codecamp_php}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    command: sh -c "php artisan config:clear && php artisan serve --host=0.0.0.0 --port=8003"
    restart: unless-stopped
    depends_on:
      - mongo

  payment:
    build: ./backend/payment-service
    container_name: webcourse-payment
    ports:
      - "8002:8002"
    environment:
      - MONGODB_URI=${DOCKER_MONGODB_URI:-mongodb://mongo:27017}
      - PAYMENT_MONGODB_DB=${PAYMENT_MONGODB_DB:-codecamp_payment}
      - REDIS_URL=${DOCKER_REDIS_URL:-redis://redis:6379}
      - PORT=8002
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - CLOUDINARY_VIDEO_FOLDER=${CLOUDINARY_VIDEO_FOLDER:-}
      - CLOUDINARY_PYTHON_FOLDER=${CLOUDINARY_PYTHON_FOLDER:-}
    restart: unless-stopped
    depends_on:
      - mongo
      - core
      - redis

volumes:
  mongo_data:
