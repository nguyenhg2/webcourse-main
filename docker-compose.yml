services:
  redis:
    image: redis:7-alpine
    container_name: webcourse-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  core:
    build: ./backend/core-service
    container_name: webcourse-core
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI is required}
      - MONGODB_DB=${MONGODB_DB:-codecamp_core}
      - PAYMENT_MONGODB_DB=${PAYMENT_MONGODB_DB:-codecamp_payment}
      - PAYMENT_SERVICE_URL=http://payment:8002
      - PAYMENT_INTERNAL_TOKEN=${PAYMENT_INTERNAL_TOKEN:-dev-internal-token}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - CORS_ORIGINS=*
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - CLOUDINARY_AUTH_TOKEN_KEY=${CLOUDINARY_AUTH_TOKEN_KEY:-}
      - CLOUDINARY_SIGNED_URL_TTL_SECONDS=${CLOUDINARY_SIGNED_URL_TTL_SECONDS:-600}
      - CLOUDINARY_SIGNED_URL_CACHE_GRACE_SECONDS=${CLOUDINARY_SIGNED_URL_CACHE_GRACE_SECONDS:-60}
      - ALLOW_LEGACY_PUBLIC_VIDEO_URLS=${ALLOW_LEGACY_PUBLIC_VIDEO_URLS:-false}
    restart: unless-stopped
    depends_on:
      - redis

  api-gateway:
    build: ./backend/api-gateway
    container_name: webcourse-api-gateway
    ports:
      - "8000:8000"
    environment:
      - CORE_SERVICE_URL=http://core:8001
      - PAYMENT_SERVICE_URL=http://payment:8002
      - MEDIA_SERVICE_URL=http://media:8004
      - BLOG_SERVICE_URL=http://blog:8003
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    depends_on:
      - redis
      - core
      - payment
      - media
      - blog

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webcourse-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000/core
      - VITE_PAYMENT_API_URL=http://localhost:8000/payment
      - VITE_MEDIA_API_URL=http://localhost:8000/media
      - VITE_BLOG_API_URL=http://localhost:8000/blog
      - VITE_STRIPE_PUBLISHABLE_KEY=${VITE_STRIPE_PUBLISHABLE_KEY:-}
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - api-gateway

  blog:
    build: ./backend/blog-service
    container_name: webcourse-blog
    ports:
      - "8003:8003"
    environment:
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI is required}
      - BLOG_MONGODB_DB=${BLOG_MONGODB_DB:-codecamp_php}
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    command: >
      sh -c 'for key in MONGODB_URI BLOG_MONGODB_DB JWT_SECRET; do
        value=$$(printenv "$$key");
        if [ -n "$$value" ]; then
          sed -i "/^$${key}=/d" .env;
          printf "\n%s=%s\n" "$$key" "$$value" >> .env;
        fi;
      done;
      php artisan config:clear && php artisan serve --host=0.0.0.0 --port=8003'
    restart: unless-stopped

  payment:
    build: ./backend/payment-service
    container_name: webcourse-payment
    ports:
      - "8002:8002"
    environment:
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI is required}
      - PAYMENT_MONGODB_DB=${PAYMENT_MONGODB_DB:-codecamp_payment}
      - PAYMENT_INTERNAL_TOKEN=${PAYMENT_INTERNAL_TOKEN:-dev-internal-token}
      - PORT=8002
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    depends_on:
      - redis

  media:
    build: ./backend/media-service
    container_name: webcourse-media
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    restart: unless-stopped
